<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Responsive Glass Login UI</title>

  <style>

    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      background: linear-gradient(-45deg, #1d2671, #c33764, #00c6ff, #6a11cb);
      background-size: 400% 400%;
      animation: gradientBG 12s ease infinite;
      position: relative;
      padding: 20px;
    }

    /* Animated Background */

    @keyframes gradientBG {

      0%{
        background-position: 0% 50%;
      }

      50%{
        background-position: 100% 50%;
      }

      100%{
        background-position: 0% 50%;
      }

    }

    /* Floating circles */

    .circle{
      position: absolute;
      border-radius: 50%;
      filter: blur(20px);
      animation: float 6s ease-in-out infinite;
    }

    .circle1{
      width: 250px;
      height: 250px;
      background: rgba(255,255,255,0.2);
      top: 10%;
      left: 10%;
    }

    .circle2{
      width: 300px;
      height: 300px;
      background: rgba(255,255,255,0.15);
      bottom: 10%;
      right: 10%;
      animation-delay: 2s;
    }

    .circle3{
      width: 180px;
      height: 180px;
      background: rgba(255,255,255,0.12);
      bottom: 30%;
      left: 40%;
      animation-delay: 4s;
    }

    @keyframes float{

      0%{
        transform: translateY(0px);
      }

      50%{
        transform: translateY(-25px);
      }

      100%{
        transform: translateY(0px);
      }

    }

    /* Login Box */

    .login-box{

      width: 90%;
      max-width: 430px;
      min-height: 520px;

      padding: 45px 35px;

      border-radius: 30px;

      background: rgba(255,255,255,0.1);

      border: 1px solid rgba(255,255,255,0.2);

      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);

      box-shadow: 0 8px 32px rgba(0,0,0,0.3);

      color: white;

      z-index: 10;

      animation: popup 1s ease;
      transition: 0.4s;

      display: flex;
      flex-direction: column;
      justify-content: center;

    }

    .login-box:hover{
      transform: scale(1.03);
      box-shadow: 0 10px 40px rgba(255,255,255,0.2);
    }

    @keyframes popup{

      from{
        opacity: 0;
        transform: translateY(50px) scale(0.8);
      }

      to{
        opacity: 1;
        transform: translateY(0px) scale(1);
      }

    }

    .login-box h2{
      text-align: center;
      margin-bottom: 35px;
      font-size: 42px;
      letter-spacing: 1px;
      animation: fadeIn 2s ease;
    }

    @keyframes fadeIn{

      from{
        opacity: 0;
      }

      to{
        opacity: 1;
      }

    }

    /* Input Fields */

    .input-box{
      margin-bottom: 22px;
      position: relative;
    }

    .input-box input{

      width: 100%;
      padding: 18px;

      border: none;
      outline: none;

      border-radius: 14px;

      background: rgba(255,255,255,0.15);

      color: white;

      font-size: 16px;

      border: 1px solid rgba(255,255,255,0.2);

      transition: 0.4s;

    }

    .input-box input::placeholder{
      color: rgba(255,255,255,0.7);
    }

    .input-box input:focus{

      background: rgba(255,255,255,0.25);

      transform: scale(1.03);

      box-shadow: 0 0 15px rgba(255,255,255,0.4);

    }

    /* Options */

    .options{

      display: flex;
      justify-content: space-between;
      align-items: center;

      margin-bottom: 25px;

      font-size: 15px;

    }

    .options a{
      color: #fff;
      text-decoration: none;
      transition: 0.3s;
    }

    .options a:hover{
      color: #00eaff;
      text-decoration: underline;
    }

    /* Login Button */

    .btn{

      width: 100%;
      padding: 18px;

      border: none;

      border-radius: 14px;

      background: rgba(255,255,255,0.25);

      color: white;

      font-size: 19px;

      cursor: pointer;

      transition: 0.4s;

      font-weight: bold;

      position: relative;

      overflow: hidden;

    }

    .btn::before{

      content: "";

      position: absolute;

      top: 0;
      left: -100%;

      width: 100%;
      height: 100%;

      background: rgba(255,255,255,0.3);

      transition: 0.5s;

    }

    .btn:hover::before{
      left: 100%;
    }

    .btn:hover{

      transform: scale(1.05);

      background: rgba(255,255,255,0.35);

      box-shadow: 0 0 20px rgba(255,255,255,0.4);

    }

    /* Register */

    .register{
      text-align: center;
      margin-top: 25px;
      font-size: 15px;
    }

    .register a{
      color: white;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    .register a:hover{
      color: #00eaff;
    }

    /* Error Message */

    #error{
      text-align: center;
      margin-top: 18px;
      color: #ffd4d4;
      font-size: 15px;
    }

    /* Mobile Responsive */

    @media(max-width: 450px){

      .login-box{
        width: 92%;
        min-height: 560px;
        padding: 40px 25px;
        border-radius: 25px;
      }

      .login-box h2{
        font-size: 38px;
      }

      .input-box input{
        padding: 18px;
        font-size: 16px;
      }

      .btn{
        padding: 18px;
        font-size: 18px;
      }

    }

  </style>
</head>

<body>

  <!-- Background Circles -->

  <div class="circle circle1"></div>
  <div class="circle circle2"></div>
  <div class="circle circle3"></div>

  <!-- Login Box -->

  <div class="login-box">

    <h2>Welcome</h2>

    <form onsubmit="login(event)">

      <div class="input-box">
        <input
          type="text"
          id="username"
          placeholder="Enter Username"
          required
        >
      </div>

      <div class="input-box">
        <input
          type="password"
          id="password"
          placeholder="Enter Password"
          required
        >
      </div>

      <div class="options">

        <label>
          <input type="checkbox">
          Remember Me
        </label>

        <a href="#">
          Forgot Password?
        </a>

      </div>

      <button type="submit" class="btn">
        Login
      </button>

      <p id="error"></p>

      <div class="register">
        Don't have an account?
        <a href="#">Register</a>
      </div>

    </form>

  </div>

  <script>

    function login(event){

      // Prevent refresh
      event.preventDefault();

      // Correct login details
      let correctUsername = "admin";
      let correctPassword = "12345";

      // User entered values
      let username =
      document.getElementById("username").value;

      let password =
      document.getElementById("password").value;

      // Check login
      if(
        username === correctUsername &&
        password === correctPassword
      ){

        // Redirect page
        window.location.href = "Welcome.html";

      }

      else{

        document.getElementById("error").innerHTML =
        "Invalid Username or Password";

      }

    }

  </script>

</body>
</html>
